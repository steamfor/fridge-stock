<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1e38"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </linearGradient>
    <linearGradient id="flake" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ec8ff"/>
      <stop offset="60%" stop-color="#3b9eff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Snowflake — vertical arm -->
  <rect x="244" y="72" width="24" height="368" rx="12" fill="url(#flake)"/>
  <!-- Snowflake — horizontal arm -->
  <rect x="72" y="244" width="368" height="24" rx="12" fill="url(#flake)"/>
  <!-- Snowflake — diagonal arms (60° / 120°) -->
  <rect x="244" y="72" width="24" height="368" rx="12" fill="url(#flake)" transform="rotate(60 256 256)"/>
  <rect x="244" y="72" width="24" height="368" rx="12" fill="url(#flake)" transform="rotate(120 256 256)"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="26" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="18" fill="url(#flake)"/>

  <!-- Branch tips — 6 directions -->
  <g fill="url(#flake)">
    <!-- Top -->
    <rect x="238" y="84" width="14" height="40" rx="7" transform="rotate(-30 245 104)"/>
    <rect x="260" y="84" width="14" height="40" rx="7" transform="rotate(30 267 104)"/>
    <!-- Bottom -->
    <rect x="238" y="388" width="14" height="40" rx="7" transform="rotate(30 245 408) rotate(180 252 408)"/>
    <rect x="260" y="388" width="14" height="40" rx="7" transform="rotate(-30 267 408) rotate(180 267 408)"/>
    <!-- Left -->
    <rect x="84" y="238" width="40" height="14" rx="7" transform="rotate(-30 104 245)"/>
    <rect x="84" y="260" width="40" height="14" rx="7" transform="rotate(30 104 267)"/>
    <!-- Right -->
    <rect x="388" y="238" width="40" height="14" rx="7" transform="rotate(30 408 245)"/>
    <rect x="388" y="260" width="40" height="14" rx="7" transform="rotate(-30 408 267)"/>
  </g>
</svg>
